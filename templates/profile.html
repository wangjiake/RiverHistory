<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Profile — {{ db_name }}</title>
<link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
<link rel="icon" type="image/x-icon" href="/img/favicon.ico" sizes="48x48">
<link rel="icon" type="image/png" href="/img/favicon-96x96.png" sizes="96x96">
<link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png">
<link rel="manifest" href="/img/site.webmanifest">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif; background: #0f1117; color: #e1e4e8; min-height: 100vh; }

/* Header */
.header { background: linear-gradient(135deg, #1a1f36 0%, #252a40 100%); padding: 24px 32px; border-bottom: 1px solid #2d3348; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 22px; font-weight: 600; color: #fff; }
.header .subtitle { font-size: 13px; color: #8b92a5; margin-top: 4px; }
.header-right { display: flex; gap: 8px; align-items: center; }
.nav-link { padding: 5px 12px; background: #252a40; border: 1px solid #2d3348; border-radius: 4px; color: #8b92a5; text-decoration: none; font-size: 12px; }
.nav-link:hover { color: #58a6ff; border-color: #58a6ff; }
.lang-switch { display: flex; gap: 4px; }
.lang-btn { padding: 4px 10px; background: #252a40; border: 1px solid #2d3348; border-radius: 4px; color: #8b92a5; cursor: pointer; font-size: 12px; }
.lang-btn:hover { color: #c9d1d9; border-color: #444c5e; }
.lang-btn.active { color: #58a6ff; border-color: #58a6ff; background: #1f2740; }

/* Stats Bar */
.stats-bar { display: flex; gap: 24px; padding: 16px 32px; background: #161822; border-bottom: 1px solid #2d3348; flex-wrap: wrap; }
.stat-item { text-align: center; }
.stat-value { font-size: 28px; font-weight: 700; color: #58a6ff; }
.stat-value.green { color: #3fb950; }
.stat-value.yellow { color: #d29922; }
.stat-value.red { color: #f85149; }
.stat-value.purple { color: #bc8cff; }
.stat-label { font-size: 11px; color: #8b92a5; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

/* Layout */
.container { display: flex; min-height: calc(100vh - 130px); }
.sidebar { width: 200px; background: #161822; border-right: 1px solid #2d3348; padding: 16px 0; flex-shrink: 0; }
.main { flex: 1; padding: 24px 32px; overflow-y: auto; }

/* Sidebar */
.sidebar h3 { font-size: 11px; color: #8b92a5; padding: 0 16px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
.filter-btn { display: block; width: 100%; text-align: left; padding: 8px 16px; background: none; border: none; color: #c9d1d9; font-size: 13px; cursor: pointer; transition: all 0.15s; }
.filter-btn:hover { background: #1c2033; color: #fff; }
.filter-btn.active { background: #1f2740; color: #58a6ff; border-left: 3px solid #58a6ff; padding-left: 13px; }

/* Tabs */
.tabs { display: flex; gap: 4px; margin-bottom: 20px; }
.tab { padding: 8px 16px; background: #1c2033; border: 1px solid #2d3348; border-radius: 6px; color: #8b92a5; cursor: pointer; font-size: 13px; transition: all 0.15s; }
.tab:hover { color: #c9d1d9; border-color: #444c5e; }
.tab.active { background: #1f2740; color: #58a6ff; border-color: #58a6ff; }
.tab .count { background: #2d3348; padding: 1px 6px; border-radius: 10px; font-size: 11px; margin-left: 4px; }

/* Cards */
.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
.card { background: #1c2033; border: 1px solid #2d3348; border-radius: 8px; padding: 16px; transition: border-color 0.15s; }
.card:hover { border-color: #444c5e; }
.card.confirmed { border-left: 3px solid #3fb950; }
.card.suspected { border-left: 3px solid #d29922; }
.card.disputed { border-left: 3px solid #f85149; }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.card-category { font-size: 11px; color: #8b92a5; background: #252a40; padding: 2px 8px; border-radius: 4px; }
.card-layer { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
.card-layer.confirmed { background: #1b3a2a; color: #3fb950; }
.card-layer.suspected { background: #3a2a1b; color: #d29922; }
.card-subject { font-size: 14px; color: #c9d1d9; font-weight: 500; }
.card-value { font-size: 16px; color: #fff; font-weight: 600; margin: 6px 0; }
.card-meta { font-size: 11px; color: #6e7681; display: flex; gap: 12px; flex-wrap: wrap; }
.card-meta span { display: flex; align-items: center; gap: 3px; }

/* Timeline */
.timeline-container { position: relative; }
.timeline-group { margin-bottom: 24px; }
.timeline-group-title { font-size: 14px; font-weight: 600; color: #c9d1d9; margin-bottom: 12px; padding-left: 20px; position: relative; }
.timeline-group-title::before { content: ''; position: absolute; left: 0; top: 50%; width: 12px; height: 12px; border-radius: 50%; transform: translateY(-50%); }
.timeline-group-title.cat-location::before { background: #58a6ff; }
.timeline-group-title.cat-career::before { background: #3fb950; }
.timeline-group-title.cat-emotion::before { background: #f85149; }
.timeline-group-title.cat-hobby::before { background: #d29922; }
.timeline-group-title.cat-other::before { background: #bc8cff; }

.timeline-track { position: relative; margin-left: 6px; padding-left: 20px; border-left: 2px solid #2d3348; }
.timeline-item { position: relative; padding: 8px 12px; margin-bottom: 4px; background: #1c2033; border-radius: 6px; border: 1px solid #2d3348; }
.timeline-item::before { content: ''; position: absolute; left: -25px; top: 14px; width: 8px; height: 8px; border-radius: 50%; background: #444c5e; border: 2px solid #1c2033; }
.timeline-item.current::before { background: #3fb950; }
.timeline-item.current { border-color: #3fb950; }
.timeline-value { font-size: 13px; color: #e1e4e8; font-weight: 500; }
.timeline-dates { font-size: 11px; color: #6e7681; margin-top: 2px; }

/* Relationships */
.rel-card { background: #1c2033; border: 1px solid #2d3348; border-radius: 8px; padding: 16px; border-left: 3px solid #bc8cff; }
.rel-name { font-size: 16px; font-weight: 600; color: #fff; }
.rel-relation { font-size: 13px; color: #bc8cff; margin-top: 2px; }
.rel-details { font-size: 12px; color: #8b92a5; margin-top: 8px; }

/* Observations */
.obs-card { background: #1c2033; border: 1px solid #2d3348; border-radius: 8px; padding: 16px; border-left: 3px solid #58a6ff; }
.obs-content { font-size: 14px; color: #e1e4e8; line-height: 1.5; }
.obs-meta { font-size: 11px; color: #6e7681; display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
.obs-type-tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; background: #1f2740; color: #58a6ff; }
.obs-subject-tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; background: #252a40; color: #c9d1d9; }
.obs-cls-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; }
.obs-cls-tag.new { background: #1f2740; color: #58a6ff; }
.obs-cls-tag.support { background: #1b3a2a; color: #3fb950; }
.obs-cls-tag.contradict { background: #3a1b1b; color: #f85149; }
.obs-cls-tag.irrelevant { background: #252a40; color: #6e7681; }
.obs-cls-tag.evidence_against { background: #3a2a1b; color: #d29922; }
.obs-context { font-size: 12px; color: #8b92a5; margin-top: 6px; font-style: italic; }

/* Snapshot */
.snapshot-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.month-select { background: #1c2033; border: 1px solid #2d3348; border-radius: 6px; color: #e1e4e8; padding: 8px 12px; font-size: 14px; cursor: pointer; }
.month-select:hover { border-color: #444c5e; }
.month-select:focus { outline: none; border-color: #58a6ff; }
.snapshot-summary { font-size: 13px; color: #8b92a5; }
.sub-filter { display: inline-flex; gap: 6px; flex-wrap: wrap; }
.sub-filter-btn { padding: 4px 12px; background: #1c2033; border: 1px solid #2d3348; border-radius: 4px; color: #8b92a5; cursor: pointer; font-size: 12px; transition: all 0.15s; }
.sub-filter-btn:hover { color: #c9d1d9; border-color: #444c5e; }
.sub-filter-btn.active { color: #58a6ff; border-color: #58a6ff; background: #1f2740; }
.card.new-this-month { border-left: 3px solid #58a6ff; }
.new-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #1f2740; color: #58a6ff; font-weight: 600; margin-left: 6px; }

/* Rejected state */
.card.rejected, .obs-card.rejected { opacity: 0.45; border-left-color: #f85149 !important; }
.card.rejected .card-value, .obs-card.rejected .obs-content { text-decoration: line-through; }
.rejected-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #3a1b1b; color: #f85149; font-weight: 600; margin-left: 6px; }
.human-end-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #3a2a1b; color: #d29922; font-weight: 600; margin-left: 6px; }

/* Review action buttons */
.review-actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.review-btn { padding: 3px 10px; font-size: 11px; border-radius: 4px; border: 1px solid #2d3348; background: #252a40; color: #8b92a5; cursor: pointer; transition: all 0.15s; }
.review-btn:hover { border-color: #444c5e; color: #c9d1d9; }
.review-btn.danger { color: #f85149; }
.review-btn.danger:hover { border-color: #f85149; background: #3a1b1b; }
.review-btn.warn { color: #d29922; }
.review-btn.warn:hover { border-color: #d29922; background: #3a2a1b; }
.review-btn.ok { color: #3fb950; }
.review-btn.ok:hover { border-color: #3fb950; background: #1b3a2a; }
.note-text { font-size: 11px; color: #d29922; font-style: italic; margin-top: 4px; }

/* Close modal */
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; display: flex; justify-content: center; align-items: center; }
.modal-box { background: #1c2033; border: 1px solid #2d3348; border-radius: 8px; padding: 24px; min-width: 320px; max-width: 480px; }
.modal-box h3 { color: #e1e4e8; margin-bottom: 16px; font-size: 16px; }
.modal-box label { font-size: 12px; color: #8b92a5; display: block; margin-bottom: 4px; }
.modal-box input, .modal-box textarea { width: 100%; background: #252a40; border: 1px solid #2d3348; border-radius: 4px; color: #e1e4e8; padding: 8px; font-size: 13px; margin-bottom: 12px; }
.modal-box textarea { resize: vertical; min-height: 60px; }
.modal-box .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.modal-box .modal-btns button { padding: 6px 16px; border-radius: 4px; border: 1px solid #2d3348; cursor: pointer; font-size: 13px; }
.modal-box .btn-cancel { background: #252a40; color: #8b92a5; }
.modal-box .btn-confirm { background: #1f2740; color: #58a6ff; border-color: #58a6ff; }

/* Section title */
.section-title { font-size: 16px; font-weight: 600; color: #c9d1d9; margin-bottom: 16px; }

/* Empty state */
.empty { text-align: center; color: #6e7681; padding: 40px; font-size: 14px; }

/* Loading */
.loading { text-align: center; color: #8b92a5; padding: 60px; }
.loading::after { content: ''; display: inline-block; width: 20px; height: 20px; border: 2px solid #2d3348; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1 data-i18n="title">用户画像</h1>
    <div class="subtitle"><span data-i18n="db_label">数据库</span>: {{ db_name }}</div>
  </div>
  <div class="header-right">
    <!-- <a href="/finance" class="nav-link" data-i18n="nav_finance">财务追踪</a> -->
    <!-- <a href="/health" class="nav-link" data-i18n="nav_health">健康追踪</a> -->
    <div class="lang-switch">
      <button class="lang-btn active" onclick="setLang('zh')">中文</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('ja')">日本語</button>
    </div>
  </div>
</div>

<div class="stats-bar" id="stats-bar">
  <div class="stat-item"><div class="stat-value" id="s-sessions">-</div><div class="stat-label" data-i18n="stat_sessions">已处理会话</div></div>
  <div class="stat-item"><div class="stat-value" id="s-observations">-</div><div class="stat-label" data-i18n="stat_observations">观察记录</div></div>
  <div class="stat-item"><div class="stat-value green" id="s-confirmed">-</div><div class="stat-label" data-i18n="stat_confirmed">已确认</div></div>
  <div class="stat-item"><div class="stat-value yellow" id="s-suspected">-</div><div class="stat-label" data-i18n="stat_suspected">待确认</div></div>
  <div class="stat-item"><div class="stat-value purple" id="s-closed">-</div><div class="stat-label" data-i18n="stat_closed">历史变迁</div></div>
  <div class="stat-item"><div class="stat-value red" id="s-disputes">-</div><div class="stat-label" data-i18n="stat_disputes">未解决矛盾</div></div>
</div>

<div class="container">
  <div class="sidebar">
    <h3 data-i18n="filter_title">分类筛选</h3>
    <button class="filter-btn active" data-category="" onclick="filterCategory(this)" data-i18n="filter_all">全部</button>
    <div id="category-list"></div>
  </div>
  <div class="main">
    <div class="tabs">
      <div class="tab active" data-tab="profile" onclick="switchTab(this)"><span data-i18n="tab_profile">当前画像</span> <span class="count" id="t-profile">0</span></div>
      <div class="tab" data-tab="timeline" onclick="switchTab(this)"><span data-i18n="tab_timeline">时间线</span> <span class="count" id="t-timeline">0</span></div>
      <div class="tab" data-tab="snapshot" onclick="switchTab(this)"><span data-i18n="tab_snapshot">月度快照</span></div>
      <div class="tab" data-tab="observations" onclick="switchTab(this)"><span data-i18n="tab_observations">观察记录</span> <span class="count" id="t-obs">0</span></div>
      <div class="tab" data-tab="relationships" onclick="switchTab(this)"><span data-i18n="tab_relationships">人际关系</span> <span class="count" id="t-rel">0</span></div>
    </div>
    <div id="content"><div class="loading" data-i18n="loading">加载中</div></div>
  </div>
</div>

<script>
// ══════════════════════════════════════
// 多语言
// ══════════════════════════════════════
const I18N = {
  zh: {
    title: '用户画像', db_label: '数据库', nav_finance: '财务追踪', nav_health: '健康追踪',

    tab_profile: '当前画像', tab_timeline: '时间线', tab_snapshot: '月度快照', tab_observations: '观察记录', tab_relationships: '人际关系',
    loading: '加载中',
    section_confirmed: '已确认画像', section_suspected: '待确认画像',

    disputed: '有争议',

  },
  en: {

    stat_sessions: 'Sessions', stat_observations: 'Observations',
    stat_confirmed: 'Confirmed', stat_suspected: 'Suspected',
    stat_closed: 'History', stat_disputes: 'Disputes',
    filter_title: 'Filter', filter_all: 'All',
    tab_profile: 'Profile', tab_timeline: 'Timeline', tab_snapshot: 'Snapshots', tab_observations: 'Observations', tab_relationships: 'Relationships',
    loading: 'Loading',
    section_confirmed: 'Confirmed', section_suspected: 'Suspected',
    layer_confirmed: 'Confirmed', layer_suspected: 'Suspected',

    current: 'Present',
    empty_profile: 'No profile data', empty_timeline: 'No timeline data', empty_snapshot: 'No profile data for this month', empty_obs: 'No observations', empty_rel: 'No relationship data',

function detectLang() {
  const lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
  if (lang.startsWith('zh')) return 'zh';
  if (lang.startsWith('ja')) return 'ja';
  return 'en';
}

let currentLang = detectLang();

function t(key, params) {
  let s = (I18N[currentLang] || I18N.en)[key] || key;
  if (params) { for (const [k, v] of Object.entries(params)) s = s.replace(`{${k}}`, v); }
  return s;
}

function monthName(m) {
  const names = (I18N[currentLang] || I18N.en).month_names;
  return names[m - 1] || m;
}

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.trim() === {zh:'中文',en:'EN',ja:'日本語'}[lang]));
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (I18N[lang][key]) el.textContent = I18N[lang][key];
  });
  renderCurrent();
}

// ══════════════════════════════════════
// 数据
// ══════════════════════════════════════
let allProfile = [];
let allTimeline = [];
let allObservations = [];
let allRelationships = [];
let snapshotMonths = [];
let snapshotData = [];
let currentSnapshotMonth = '';
let snapshotFilter = 'all'; // 'all' or 'new'
let obsMonthFilter = ''; // '' = all, 'YYYY-MM' = specific month
let currentCategory = '';
let currentTab = 'profile';
let profileStatusFilter = 'active'; // 'active' | 'human_closed' | 'rejected'

function renderStats(stats) {
  document.getElementById('s-sessions').textContent = stats.sessions;
  document.getElementById('s-observations').textContent = stats.observations;
  document.getElementById('s-confirmed').textContent = stats.confirmed;
  document.getElementById('s-suspected').textContent = stats.suspected;
  document.getElementById('s-closed').textContent = stats.closed;
  document.getElementById('s-disputes').textContent = stats.disputes;
}

async function init() {
  setLang(currentLang);
  const [stats, profile, timeline, observations, relationships, months] = await Promise.all([
    fetch('/api/stats').then(r => r.json()),
    fetch('/api/profile').then(r => r.json()),
    fetch('/api/timeline').then(r => r.json()),
    fetch('/api/observations').then(r => r.json()),
    fetch('/api/relationships').then(r => r.json()),
    fetch('/api/snapshot/months').then(r => r.json()),
  ]);
  snapshotMonths = months;

  renderStats(stats);

  allProfile = profile;
  allTimeline = timeline;
  allObservations = observations;
  allRelationships = relationships;

  document.getElementById('t-profile').textContent = profile.length;
  document.getElementById('t-timeline').textContent = timeline.length;
  document.getElementById('t-obs').textContent = observations.length;
  document.getElementById('t-rel').textContent = relationships.length;

  updateSidebar();
  renderCurrent();
}

function filterCategory(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCategory = btn.dataset.category;
  renderCurrent();
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentTab = tab.dataset.tab;
  currentCategory = '';
  obsMonthFilter = '';
  snapshotFilter = 'all';
  updateSidebar();
  renderCurrent();
}

function updateSidebar() {
  const catList = document.getElementById('category-list');
  catList.innerHTML = '';
  // 重置"全部"按钮
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn[data-category=""]').classList.add('active');

  if (currentTab === 'snapshot') {
    // 快照：按 category 筛选（从快照数据中）
    if (snapshotData.length > 0) {
      const categories = [...new Set(snapshotData.map(p => p.category))].sort();
      categories.forEach(cat => {
        const count = snapshotData.filter(p => p.category === cat).length;
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.dataset.category = cat;
        btn.textContent = `${cat} (${count})`;
        btn.onclick = function() { filterCategory(this); };
        catList.appendChild(btn);
      });
    }
  } else if (currentTab === 'observations') {
    // 观察记录：按 observation_type 筛选
    const types = [...new Set(allObservations.map(o => o.observation_type || 'other'))].sort();
    types.forEach(type => {
      const count = allObservations.filter(o => (o.observation_type || 'other') === type).length;
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.category = type;
      btn.textContent = `${type} (${count})`;
      btn.onclick = function() { filterCategory(this); };
      catList.appendChild(btn);
    });
  } else if (currentTab === 'relationships') {
    // 人际关系：按 relation 筛选
    const relations = [...new Set(allRelationships.map(r => r.relation || 'other'))].sort();
    relations.forEach(rel => {
      const count = allRelationships.filter(r => (r.relation || 'other') === rel).length;
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.category = rel;
      btn.textContent = `${rel} (${count})`;
      btn.onclick = function() { filterCategory(this); };
      catList.appendChild(btn);
    });
  } else {
    // 根据 tab 选择数据源
    const source = currentTab === 'timeline' ? allTimeline : allProfile;
    const categories = [...new Set(source.map(p => p.category))].sort();
    categories.forEach(cat => {
      const count = source.filter(p => p.category === cat).length;
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.category = cat;
      btn.textContent = `${cat} (${count})`;
      btn.onclick = function() { filterCategory(this); };
      catList.appendChild(btn);
    });
  }
}

function renderCurrent() {
  if (currentTab === 'profile') renderProfile();
  else if (currentTab === 'timeline') renderTimeline();
  else if (currentTab === 'snapshot') renderSnapshot();
  else if (currentTab === 'observations') renderObservations();
  else if (currentTab === 'relationships') renderRelationships();
}

// ── 画像卡片 ──
function buildProfileStatusFilter() {
  const counts = {
    active: allProfile.filter(d => !d.rejected && !d.human_end_time).length,
    human_closed: allProfile.filter(d => !d.rejected && d.human_end_time).length,
    rejected: allProfile.filter(d => d.rejected).length,
  };
  return `<div class="sub-filter" style="margin-bottom:16px">
    <button class="sub-filter-btn ${profileStatusFilter==='active'?'active':''}" onclick="setProfileStatus('active')">${t('filter_active')} <span class="count">${counts.active}</span></button>
    <button class="sub-filter-btn ${profileStatusFilter==='human_closed'?'active':''}" onclick="setProfileStatus('human_closed')">${t('filter_human_closed')} <span class="count">${counts.human_closed}</span></button>
    <button class="sub-filter-btn ${profileStatusFilter==='rejected'?'active':''}" onclick="setProfileStatus('rejected')">${t('filter_rejected')} <span class="count">${counts.rejected}</span></button>
  </div>`;
}

function setProfileStatus(s) {
  profileStatusFilter = s;
  renderProfile();
}

function renderProfile() {
  let data = allProfile;

  // 按状态筛选（三种互斥）
  if (profileStatusFilter === 'active') {
    data = data.filter(d => !d.rejected && !d.human_end_time);
  } else if (profileStatusFilter === 'human_closed') {
    data = data.filter(d => !d.rejected && d.human_end_time);
  } else if (profileStatusFilter === 'rejected') {
    data = data.filter(d => d.rejected);
  }

  if (currentCategory) data = data.filter(d => d.category === currentCategory);

  const filterHtml = buildProfileStatusFilter();

  if (data.length === 0) {
    document.getElementById('content').innerHTML = filterHtml + `<div class="empty">${t('empty_profile')}</div>`;
    return;
  }

  const confirmed = data.filter(d => d.layer === 'confirmed');
  const suspected = data.filter(d => d.layer === 'suspected');

  let html = filterHtml;
  if (confirmed.length > 0) {
    html += `<div class="section-title">${t('section_confirmed')}</div><div class="cards">`;
    confirmed.forEach(d => { html += cardHTML(d); });
    html += '</div>';
  }
  if (suspected.length > 0) {
    html += `<div class="section-title" style="margin-top:24px">${t('section_suspected')}</div><div class="cards">`;
    suspected.forEach(d => { html += cardHTML(d); });
    html += '</div>';
  }
  document.getElementById('content').innerHTML = html;
}

function cardHTML(d) {
  const disputed = d.superseded_by ? ' disputed' : '';
  const rejectedCls = d.rejected ? ' rejected' : '';
  const disputeTag = d.superseded_by ? ` <span style="color:#f85149;font-size:11px">[${t('disputed')}]</span>` : '';
  const rejectedTag = d.rejected ? `<span class="rejected-badge">${t('review_rejected')}</span>` : '';
  const humanEndTag = d.human_end_time ? `<span class="human-end-badge">${t('review_human_closed')}: ${formatDate(d.human_end_time)}</span>` : '';
  const layerText = d.layer === 'confirmed' ? t('layer_confirmed') : t('layer_suspected');
  const confirmedAt = d.confirmed_at ? `<span>${t('confirmed_at')}: ${formatDate(d.confirmed_at)}</span>` : '';
  const noteHtml = d.note ? `<div class="note-text">${d.note}</div>` : '';

  // 审核按钮（三种互斥状态：正常 / 已标记错误 / 已人工关闭）
  let reviewBtns = '<div class="review-actions">';
  if (d.rejected) {
    // 已标记错误 → 只能取消标记
    reviewBtns += `<button class="review-btn ok" onclick="reviewProfile(${d.id},'unreject')">${t('review_unreject')}</button>`;
  } else if (d.human_end_time) {
    // 已人工关闭 → 只能取消关闭
    reviewBtns += `<button class="review-btn ok" onclick="reviewProfile(${d.id},'reopen')">${t('review_reopen')}</button>`;
  } else {
    // 正常状态 → 可以标记错误 或 人工关闭
    reviewBtns += `<button class="review-btn danger" onclick="reviewProfile(${d.id},'reject')">${t('review_reject')}</button>`;
    reviewBtns += `<button class="review-btn warn" onclick="showCloseModal(${d.id})">${t('review_close')}</button>`;
  }
  reviewBtns += '</div>';

  return `<div class="card ${d.layer}${disputed}${rejectedCls}">
    <div class="card-header">
      <span class="card-category">${d.category}</span>
      <span class="card-layer ${d.layer}">${layerText}${rejectedTag}${humanEndTag}</span>
    </div>
    <div class="card-subject">${d.subject}${disputeTag}</div>
    <div class="card-value">${d.value}</div>
    <div class="card-meta">
      <span>${t('mentions', {n: d.mention_count})}</span>
      <span>${t('source')}: ${d.source_type || '?'}</span>
      ${confirmedAt}
      <span>${t('updated')}: ${formatDate(d.updated_at)}</span>
    </div>
    ${noteHtml}
    ${reviewBtns}
  </div>`;
}

// ── 时间线 ──
function renderTimeline() {
  let data = allTimeline;
  if (currentCategory) data = data.filter(d => d.category === currentCategory);

  if (data.length === 0) {
    document.getElementById('content').innerHTML = `<div class="empty">${t('empty_timeline')}</div>`;
    return;
  }

  const groups = {};
  data.forEach(d => {
    const key = `${d.category}|${d.subject}`;
    if (!groups[key]) groups[key] = { category: d.category, subject: d.subject, items: [] };
    groups[key].items.push(d);
  });

  const sorted = Object.values(groups).sort((a, b) => b.items.length - a.items.length);

  let html = '<div class="timeline-container">';
  sorted.forEach(group => {
    const catClass = getCatClass(group.category);
    html += `<div class="timeline-group">`;
    html += `<div class="timeline-group-title ${catClass}">${group.category} / ${group.subject}</div>`;
    html += `<div class="timeline-track">`;
    group.items.forEach(item => {
      const isCurrent = item.end_time === null;
      const cls = isCurrent ? ' current' : '';
      const start = formatDate(item.start_time);
      const end = isCurrent ? t('current') : formatDate(item.end_time);
      const layerText = item.layer === 'confirmed' ? t('layer_confirmed') : t('layer_suspected');
      html += `<div class="timeline-item${cls}">
        <div class="timeline-value">${item.value}</div>
        <div class="timeline-dates">${start} ~ ${end}  (${layerText}, ${t('mentions', {n: item.mention_count})})</div>
      </div>`;
    });
    html += '</div></div>';
  });
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function getCatClass(category) {
  if (['位置', '居住城市', '居住地', '出生地'].includes(category)) return 'cat-location';
  if (['职业', '工作', '职位', '教育背景'].includes(category)) return 'cat-career';
  if (['情感', '感情', '人际关系', '社交'].includes(category)) return 'cat-emotion';
  if (['兴趣爱好', '活动', '运动', '娱乐', '兴趣'].includes(category)) return 'cat-hobby';
  return 'cat-other';
}

// ── 月度快照 ──
let snapshotYearFilter = '';

function buildSnapshotHeader() {
  // 提取所有年份
  const years = [...new Set(snapshotMonths.map(m => m.substring(0, 4)))].sort();

  // 第一排：年份按钮
  let yearBtns = '';
  years.forEach(y => {
    yearBtns += `<button class="sub-filter-btn ${snapshotYearFilter===y?'active':''}" onclick="setSnapshotYear('${y}')">${y}</button>`;
  });

  // 第二排：月份 1-12（选了年份后显示）
  let monthBtns = '';
  if (snapshotYearFilter) {
    const availableMonths = new Set(
      snapshotMonths
        .filter(m => m.startsWith(snapshotYearFilter))
        .map(m => m.substring(5, 7))
    );
    monthBtns = `<div class="sub-filter" style="margin-top:8px">`;
    for (let m = 1; m <= 12; m++) {
      const mm = String(m).padStart(2, '0');
      const key = `${snapshotYearFilter}-${mm}`;
      const has = availableMonths.has(mm);
      if (has) {
        monthBtns += `<button class="sub-filter-btn ${currentSnapshotMonth===key?'active':''}" onclick="loadSnapshot('${key}')">${monthName(m)}</button>`;
      } else {
        monthBtns += `<button class="sub-filter-btn" disabled style="opacity:0.3;cursor:default">${monthName(m)}</button>`;
      }
    }
    monthBtns += `</div>`;
  }

  // 第三排：全部 / 本月新增
  let filterBtns = '';
  if (currentSnapshotMonth) {
    filterBtns = `<div class="sub-filter" style="margin-top:8px">
      <button class="sub-filter-btn ${snapshotFilter==='all'?'active':''}" onclick="setSnapshotFilter('all')">${t('snapshot_all')}</button>
      <button class="sub-filter-btn ${snapshotFilter==='new'?'active':''}" onclick="setSnapshotFilter('new')">${t('snapshot_new_only')}</button>
    </div>`;
  }

  return `<div class="snapshot-header" style="flex-direction:column;align-items:flex-start"><div class="sub-filter">${yearBtns}</div>${monthBtns}${filterBtns}</div>`;
}

function setSnapshotYear(y) {
  snapshotYearFilter = y;
  // 自动选中该年第一个有数据的月份
  const firstMonth = snapshotMonths.find(m => m.startsWith(y));
  if (firstMonth && firstMonth !== currentSnapshotMonth) {
    currentSnapshotMonth = firstMonth;
    snapshotFilter = 'all';
    snapshotData = [];
  }
  renderSnapshot();
}

function setSnapshotFilter(f) {
  snapshotFilter = f;
  renderSnapshot();
}

async function renderSnapshot() {
  // 自动初始化年份和月份
  if (!snapshotYearFilter && snapshotMonths.length > 0) {
    const lastMonth = snapshotMonths[snapshotMonths.length - 1];
    snapshotYearFilter = lastMonth.substring(0, 4);
    currentSnapshotMonth = lastMonth;
  }

  const headerHtml = buildSnapshotHeader();

  if (!currentSnapshotMonth) {
    document.getElementById('content').innerHTML = headerHtml + `<div class="empty">${t('empty_snapshot')}</div>`;
    return;
  }

  // 如果还没加载过该月数据，请求 API
  if (snapshotData.length === 0 || snapshotData._month !== currentSnapshotMonth) {
    const data = await fetch(`/api/snapshot?month=${currentSnapshotMonth}`).then(r => r.json());
    snapshotData = data;
    snapshotData._month = currentSnapshotMonth;
    updateSidebar();
  }

  let data = snapshotData;
  if (snapshotFilter === 'new') data = data.filter(d => d.is_new);
  if (currentCategory) data = data.filter(d => d.category === currentCategory);

  if (data.length === 0) {
    document.getElementById('content').innerHTML = buildSnapshotHeader() + `<div class="empty">${t('empty_snapshot')}</div>`;
    return;
  }

  const confirmed = data.filter(d => d.layer === 'confirmed');
  const suspected = data.filter(d => d.layer === 'suspected');
  const newCount = data.filter(d => d.is_new).length;

  let html = buildSnapshotHeader();
  html += `<div style="font-size:13px;color:#8b92a5;margin-bottom:16px">${currentSnapshotMonth}: ${data.length} ${snapshotFilter === 'new' ? 'new' : 'facts'} (${confirmed.length} confirmed, ${suspected.length} suspected${snapshotFilter === 'all' ? ', ' + newCount + ' new' : ''})</div>`;

  if (confirmed.length > 0) {
    html += `<div class="section-title">${t('section_confirmed')}</div><div class="cards">`;
    confirmed.forEach(d => { html += snapshotCardHTML(d); });
    html += '</div>';
  }
  if (suspected.length > 0) {
    html += `<div class="section-title" style="margin-top:24px">${t('section_suspected')}</div><div class="cards">`;
    suspected.forEach(d => { html += snapshotCardHTML(d); });
    html += '</div>';
  }
  document.getElementById('content').innerHTML = html;
}

async function loadSnapshot(month) {
  currentSnapshotMonth = month;
  currentCategory = '';
  snapshotFilter = 'all';
  snapshotData = [];
  await renderSnapshot();
}

function snapshotCardHTML(d) {
  const layerText = d.layer === 'confirmed' ? t('layer_confirmed') : t('layer_suspected');
  const newBadge = d.is_new ? `<span class="new-badge">${t('snapshot_new')}</span>` : '';
  const cardClass = d.is_new ? 'card new-this-month' : `card ${d.layer}`;
  return `<div class="${cardClass}">
    <div class="card-header">
      <span class="card-category">${d.category}</span>
      <span class="card-layer ${d.layer}">${layerText}${newBadge}</span>
    </div>
    <div class="card-subject">${d.subject}</div>
    <div class="card-value">${d.value}</div>
    <div class="card-meta">
      <span>${t('mentions', {n: d.mention_count})}</span>
      <span>${formatDate(d.start_time)} ~</span>
    </div>
  </div>`;
}

// ── 观察记录 ──
let obsYearFilter = ''; // '' = all, '2023' = specific year

function buildObsHeader() {
  // 提取所有年份
  const years = [...new Set(allObservations.map(o => (o.created_at || '').substring(0, 4)).filter(y => y))].sort();

  // 第一排：全部 + 年份
  let yearBtns = `<button class="sub-filter-btn ${obsYearFilter===''?'active':''}" onclick="setObsYear('')">${t('obs_all')}</button>`;
  years.forEach(y => {
    yearBtns += `<button class="sub-filter-btn ${obsYearFilter===y?'active':''}" onclick="setObsYear('${y}')">${y}</button>`;
  });

  // 第二排：月份 1-12（仅当选了年份时显示）
  let monthBtns = '';
  if (obsYearFilter) {
    const availableMonths = new Set(
      allObservations
        .filter(o => (o.created_at || '').startsWith(obsYearFilter))
        .map(o => (o.created_at || '').substring(5, 7))
    );
    monthBtns = `<div class="sub-filter" style="margin-top:8px">`;
    monthBtns += `<button class="sub-filter-btn ${obsMonthFilter===''?'active':''}" onclick="setObsMonth('')">${t('obs_all')}</button>`;
    for (let m = 1; m <= 12; m++) {
      const mm = String(m).padStart(2, '0');
      const key = `${obsYearFilter}-${mm}`;
      const has = availableMonths.has(mm);
      if (has) {
        monthBtns += `<button class="sub-filter-btn ${obsMonthFilter===key?'active':''}" onclick="setObsMonth('${key}')">${monthName(m)}</button>`;
      } else {
        monthBtns += `<button class="sub-filter-btn" disabled style="opacity:0.3;cursor:default">${monthName(m)}</button>`;
      }
    }
    monthBtns += `</div>`;
  }

  return `<div class="snapshot-header" style="flex-direction:column;align-items:flex-start"><div class="sub-filter">${yearBtns}</div>${monthBtns}</div>`;
}

function setObsYear(y) {
  obsYearFilter = y;
  obsMonthFilter = '';
  renderObservations();
}

function setObsMonth(m) {
  obsMonthFilter = m;
  renderObservations();
}

function renderObservations() {
  let data = allObservations;
  if (obsMonthFilter) {
    data = data.filter(o => (o.created_at || '').startsWith(obsMonthFilter));
  } else if (obsYearFilter) {
    data = data.filter(o => (o.created_at || '').startsWith(obsYearFilter));
  }
  if (currentCategory) data = data.filter(o => (o.observation_type || 'other') === currentCategory);

  const headerHtml = buildObsHeader();

  if (data.length === 0) {
    document.getElementById('content').innerHTML = headerHtml + `<div class="empty">${t('empty_obs')}</div>`;
    return;
  }

  // 按 observation_type 分组
  const groups = {};
  data.forEach(o => {
    const type = o.observation_type || 'other';
    if (!groups[type]) groups[type] = [];
    groups[type].push(o);
  });

  const sortedTypes = Object.keys(groups).sort((a, b) => groups[b].length - groups[a].length);

  let html = headerHtml;
  sortedTypes.forEach(type => {
    const items = groups[type];
    html += `<div class="section-title" style="margin-top:16px">${type} <span style="font-size:12px;color:#6e7681">(${items.length})</span></div>`;
    html += '<div class="cards">';
    items.forEach(o => {
      const subjectTag = o.subject ? `<span class="obs-subject-tag">${o.subject}</span>` : '';
      const cls = o.classification || '';
      const clsTag = cls ? `<span class="obs-cls-tag ${cls}">${cls}</span>` : '';
      const contextLine = o.context ? `<div class="obs-context">${o.context}</div>` : '';
      const rejectedCls = o.rejected ? ' rejected' : '';
      const rejectedTag = o.rejected ? `<span class="rejected-badge">${t('review_rejected')}</span>` : '';
      const noteHtml = o.note ? `<div class="note-text">${o.note}</div>` : '';
      let obsBtns = '<div class="review-actions">';
      if (o.rejected) {
        obsBtns += `<button class="review-btn ok" onclick="reviewObs(${o.id},'unreject')">${t('review_unreject')}</button>`;
      } else {
        obsBtns += `<button class="review-btn danger" onclick="reviewObs(${o.id},'reject')">${t('review_reject')}</button>`;
      }
      obsBtns += '</div>';
      html += `<div class="obs-card${rejectedCls}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div style="display:flex;gap:6px;align-items:center">${subjectTag}${clsTag}${rejectedTag}</div>
          <span style="font-size:11px;color:#6e7681">${formatDate(o.created_at)}</span>
        </div>
        <div class="obs-content">${o.content}</div>
        ${contextLine}
        ${noteHtml}
        ${obsBtns}
      </div>`;
    });
    html += '</div>';
  });
  document.getElementById('content').innerHTML = html;
}

// ── 人际关系 ──
function renderRelationships() {
  let data = allRelationships;
  if (currentCategory) data = data.filter(r => (r.relation || 'other') === currentCategory);

  if (data.length === 0) {
    document.getElementById('content').innerHTML = `<div class="empty">${t('empty_rel')}</div>`;
    return;
  }
  let html = '<div class="cards">';
  data.forEach(r => {
    let details = '';
    if (r.details && typeof r.details === 'object') {
      details = Object.entries(r.details).map(([k,v]) => `${k}: ${v}`).join(', ');
    } else if (r.details && typeof r.details === 'string') {
      try { const d = JSON.parse(r.details); details = Object.entries(d).map(([k,v]) => `${k}: ${v}`).join(', '); } catch(e) { details = r.details; }
    }
    html += `<div class="rel-card">
      <div class="rel-name">${r.name || t('unknown')}</div>
      <div class="rel-relation">${r.relation}</div>
      ${details ? `<div class="rel-details">${details}</div>` : ''}
      <div class="card-meta" style="margin-top:8px">
        <span>${t('mentions', {n: r.mention_count})}</span>
        <span>${t('first_seen')}: ${formatDate(r.first_mentioned_at)}</span>
        <span>${t('last_seen')}: ${formatDate(r.last_mentioned_at)}</span>
      </div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function formatDate(s) {
  if (!s) return '?';
  return s.substring(0, 10);
}

// ── 人工审核 ──

async function reviewProfile(id, action, extra) {
  const body = { id, action, ...extra };
  if (action === 'reject' || action === 'unreject' || action === 'reopen') {
    if (!body.note && body.note !== '') {
      const note = prompt(t('review_note_placeholder'), '');
      if (note === null) return; // 取消
      body.note = note;
    }
  }
  try {
    const res = await fetch('/api/review/profile', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (data.ok) {
      // 重新加载数据
      await reloadCurrentTab();
    } else {
      alert(data.error || 'Error');
    }
  } catch (e) {
    alert('Request failed: ' + e.message);
  }
}

async function reviewObs(id, action) {
  const body = { id, action };
  if (action === 'reject' || action === 'unreject') {
    const note = prompt(t('review_note_placeholder'), '');
    if (note === null) return;
    body.note = note;
  }
  try {
    const res = await fetch('/api/review/observation', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (data.ok) {
      await reloadCurrentTab();
    } else {
      alert(data.error || 'Error');
    }
  } catch (e) {
    alert('Request failed: ' + e.message);
  }
}

function showCloseModal(factId) {
  const now = new Date().toISOString().substring(0, 16);
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal-box">
    <h3>${t('review_close_title')}</h3>
    <label>${t('review_end_time')}</label>
    <input type="datetime-local" id="modal-end-time" value="${now}">
    <label>${t('review_note_placeholder')}</label>
    <textarea id="modal-note"></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="this.closest('.modal-overlay').remove()">${t('review_cancel')}</button>
      <button class="btn-confirm" onclick="submitClose(${factId})">${t('review_confirm')}</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
}

async function submitClose(factId) {
  const endTime = document.getElementById('modal-end-time').value;
  const note = document.getElementById('modal-note').value;
  document.querySelector('.modal-overlay').remove();
  await reviewProfile(factId, 'close', {
    human_end_time: endTime ? new Date(endTime).toISOString() : null,
    note: note || '',
  });
}

async function reloadCurrentTab() {
  if (currentTab === 'profile') {
    allProfile = await fetch('/api/profile').then(r => r.json());
    renderProfile();
  } else if (currentTab === 'timeline') {
    allTimeline = await fetch('/api/timeline').then(r => r.json());
    renderTimeline();
  } else if (currentTab === 'snapshot') {
    snapshotData = [];
    await renderSnapshot();
  } else if (currentTab === 'observations') {
    allObservations = await fetch('/api/observations').then(r => r.json());
    renderObservations();
  }
  // 刷新统计
  const stats = await fetch('/api/stats').then(r => r.json());
  renderStats(stats);
}

init();
</script>
